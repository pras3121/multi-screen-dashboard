<!DOCTYPE html>
<html>
<head>
  <title>YouTube Multi Dashboard</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; }

    #controls {
      padding:10px;
      background:#111;
      position:sticky;
      top:0;
    }

    textarea {
      width:100%;
      height:80px;
    }

    button, select, input {
      margin:5px;
      padding:8px;
    }

    #grid {
      display:grid;
      gap:5px;
      padding:5px;
    }

    iframe {
      width:100%;
      height:160px;
      border:none;
    }

    .card {
      border:1px solid #333;
      padding:5px;
    }

    .stats {
      font-size:12px;
      margin-top:3px;
    }
  </style>
</head>

<body>

<div id="controls">
  Grid:
  <select id="gridSize">
    <option value="4">4×4</option>
    <option value="5">5×5</option>
    <option value="6" selected>6×6</option>
  </select>

  <button onclick="loadVideos()">📥 Load</button>
  <button onclick="randomizeVideos()">🔄 Change</button>

  Auto Change (sec):
  <input type="number" id="intervalTime" value="60">

  <br>

  <textarea id="videoInput" placeholder="Paste YouTube links or IDs"></textarea>
</div>

<div id="grid"></div>

<script>
let videoList = [];
let interval;

function extractVideoID(url) {
  let match = url.match(/(v=|\/)([0-9A-Za-z_-]{11})/);
  return match ? match[2] : url;
}

function loadVideos() {
  const input = document.getElementById("videoInput").value;

  videoList = input.split("\n")
    .map(v => extractVideoID(v.trim()))
    .filter(v => v);

  createGrid();
  startAuto();
}

function createGrid() {
  const size = document.getElementById("gridSize").value;
  const grid = document.getElementById("grid");

  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${size},1fr)`;

  videoList.forEach(id => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${id}?mute=1"></iframe>
      <div class="stats">
        <a href="https://www.youtube.com/watch?v=${id}" target="_blank">Open</a> |
        <a href="https://wa.me/?text=https://youtube.com/watch?v=${id}" target="_blank">Share</a>
      </div>
    `;

    grid.appendChild(div);
  });
}

function randomizeVideos() {
  createGrid();
}

function startAuto() {
  clearInterval(interval);
  const sec = document.getElementById("intervalTime").value * 1000;

  interval = setInterval(() => {
    randomizeVideos();
  }, sec);
}
</script>

</body>
</html>
