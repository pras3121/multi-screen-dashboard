<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Advanced YouTube Traffic Dashboard</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        #header { padding: 15px; background: #111; border-bottom: 2px solid #f00; display: flex; flex-wrap: wrap; gap: 10px; }
        textarea { width: 100%; height: 50px; background: #1a1a1a; color: #0f0; border: 1px solid #333; padding: 8px; }
        button { background: #f00; color: #fff; border: none; padding: 10px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #grid { display: grid; gap: 10px; padding: 10px; }
        .vid-box { position: relative; padding-top: 56.25%; background: #000; box-shadow: 0 0 10px rgba(255,0,0,0.1); }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .status-bar { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div id="header">
    <textarea id="vLinks" placeholder="Paste YouTube Links here..."></textarea>
    <select id="gSize">
        <option value="2">Low Traffic (2x2)</option>
        <option value="3">Medium Traffic (3x3)</option>
        <option value="4" selected>High Traffic (4x4)</option>
    </select>
    <input type="number" id="minTime" value="45" title="Seconds" style="width:60px; background:#222; color:#fff; border:1px solid #444;">
    <button onclick="startTraffic()">🔥 Start Boosting</button>
    <div class="status-bar" id="stat">Taiyaar...</div>
</div>

<div id="grid"></div>

<script>
    let vList = [];
    
    function startTraffic() {
        const input = document.getElementById("vLinks").value;
        vList = input.split("\n").map(l => {
            const m = l.match(/(?:v=|be\/|embed\/)([^#&?]*)/);
            return m ? m[1] : (l.length === 11 ? l : null);
        }).filter(id => id);

        if(!vList.length) return alert("Sahi Link Dalein!");

        const size = document.getElementById("gSize").value;
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

        for(let i=0; i < (size*size); i++) {
            const div = document.createElement("div");
            div.className = "vid-box";
            div.id = "s-" + i;
            grid.appendChild(div);
            launchVideo(i);
        }
    }

    function launchVideo(index) {
        const box = document.getElementById("s-" + index);
        const vidID = vList[Math.floor(Math.random() * vList.length)];
        
        // Random behavior parameters
        const start = Math.floor(Math.random() * 60); // Randomly starts within first minute
        const rand = Math.random().toString(36).substring(7); // Cache busting string
        
        const iframe = document.createElement("iframe");
        // 'origin' and 'enablejsapi' helps in making the request look legit
        iframe.src = `https://www.youtube.com/embed/${vidID}?autoplay=1&mute=1&playlist=${vidID}&loop=1&start=${start}&enablejsapi=1&rel=0&iv_load_policy=3&vq=tiny&_cb=${rand}`;
        iframe.allow = "autoplay; encrypted-media";
        
        box.innerHTML = "";
        box.appendChild(iframe);

        // Natural dynamic refreshing (Not fixed)
        const time = (parseInt(document.getElementById("minTime").value) * 1000) + (Math.random() * 15000);
        setTimeout(() => launchVideo(index), time);
        
        document.getElementById("stat").innerText = "Running... Refreshing in random intervals.";
    }
</script>
</body>
</html>
