<!DOCTYPE html>
<html>
<head>
  <title>Multi Video Screen</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family:Arial; }

    #controls {
      padding:10px;
      background:#111;
      position:sticky;
      top:0;
    }

    textarea { width:100%; height:80px; }

    #grid {
      display:grid;
      gap:5px;
      padding:5px;
    }

    iframe {
      width:100%;
      height:180px;
      border:none;
    }
  </style>
</head>

<body>

<div id="controls">
  Grid:
  <select id="gridSize">
    <option value="2">2×2</option>
    <option value="3">3×3</option>
    <option value="4">4×4</option>
    <option value="5">5×5</option>
  </select>

  <button onclick="loadVideos()">Load</button>

  <br><br>

  <textarea id="videoInput" placeholder="Paste YouTube links (one per line)"></textarea>
</div>

<div id="grid"></div>

<script>
let videoList = [];

function getID(url) {
  let match = url.match(/(v=|\/)([0-9A-Za-z_-]{11})/);
  return match ? match[2] : null;
}

function loadVideos() {
  const input = document.getElementById("videoInput").value;

  videoList = input.split("\n")
    .map(v => getID(v.trim()))
    .filter(v => v);

  createGrid();
}

function createGrid() {
  const size = document.getElementById("gridSize").value;
  const grid = document.getElementById("grid");

  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${size},1fr)`;

  let total = size * size;

  for (let i = 0; i < total; i++) {
    const id = videoList[i % videoList.length];

    const iframe = document.createElement("iframe");

    iframe.src = `https://www.youtube.com/embed/${id}?mute=1&rel=0`;

    iframe.allow = "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture";

    grid.appendChild(iframe);
  }
}
</script>

</body>
</html>
