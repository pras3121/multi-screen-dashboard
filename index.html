<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>🔥 YouTube Booster - Videos PLAY Guaranteed</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #welcome { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: linear-gradient(45deg, #000, #111, #f00);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        #welcome h1 { font-size: 3em; margin-bottom: 20px; text-shadow: 0 0 20px #f00; }
        #welcome button { background: #f00; color: #fff; border: none; padding: 20px 50px; font-size: 1.5em; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(255,0,0,0.5); transition: all 0.3s; }
        #welcome button:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(255,0,0,0.7); }
        
        #header { padding: 20px; background: linear-gradient(#111, #000); border-bottom: 3px solid #f00; position: sticky; top: 0; z-index: 10; }
        #header > * { vertical-align: middle; }
        textarea { width: 350px; height: 60px; background: #1a1a1a; color: #0f0; border: 2px solid #333; padding: 10px; border-radius: 10px; font-family: monospace; }
        select, input { background: #222; color: #fff; border: 2px solid #444; padding: 10px 15px; border-radius: 8px; margin: 0 5px; }
        button { background: linear-gradient(#f00, #c00); color: #fff; border: none; padding: 12px 25px; cursor: pointer; border-radius: 25px; font-weight: bold; margin: 0 5px; box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        button:hover { transform: translateY(-2px); }
        button:disabled { background: #666; cursor: not-allowed; transform: none; }
        
        #grid { display: grid; padding: 20px; gap: 15px; max-width: 1600px; margin: 0 auto; }
        .vid-box { 
            position: relative; 
            aspect-ratio: 16/9; 
            background: #111; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(255,0,0,0.3);
            transition: transform 0.3s;
        }
        .vid-box:hover { transform: scale(1.02); }
        iframe { width: 100%; height: 100%; border: none; border-radius: 15px; }
        .play-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            font-size: 4em; cursor: pointer; transition: all 0.3s;
        }
        .play-overlay:hover { background: rgba(255,0,0,0.9); }
        
        #stats { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 15px; border: 2px solid #f00; }
        #viewCounter { font-size: 2em; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="welcome">
        <h1>🎥 YouTube Video Booster</h1>
        <p style="font-size: 1.5em; margin-bottom: 30px;">Multiple screens mein videos auto-play + views boost!</p>
        <button onclick="initApp()">🚀 START BOOSTER</button>
    </div>

    <div id="app" style="display: none;">
        <div id="header">
            <textarea id="vLinks" placeholder="YouTube links (har line ek video)&#10;https://youtu.be/dQw4w9WgXcQ"></textarea>
            <select id="gSize">
                <option value="2">2x2 (4 screens)</option>
                <option value="3">3x3 (9 screens)</option>
                <option value="4" selected>4x4 (16 screens)</option>
                <option value="5">5x5 (25 screens)</option>
            </select>
            <input type="number" id="refreshTime" value="90" min="30" max="300" title="Refresh (seconds)" />
            <button id="startBtn" onclick="startBoost()">🔥 BOOST ON</button>
            <button id="stopBtn" onclick="stopBoost()" style="display:none;">⏹️ STOP</button>
        </div>
        
        <div id="grid"></div>
        
        <div id="stats">
            <div>Active Screens: <span id="activeCount">0</span></div>
            <div>Total Views: <span id="viewCounter">0</span></div>
            <div id="status">Ready...</div>
        </div>
    </div>

    <script>
        let vids = [];
        let isBoosting = false;
        let viewCount = 0;
        let timeouts = [];

        function initApp() {
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        function startBoost() {
            const links = document.getElementById('vLinks').value.trim();
            if (!links) return alert('Links daalein!');

            vids = links.split('
').map(l => {
                const match = l.match(/(?:v=|/(?:shorts/|be/|embed/|v/))([^#&?]{11})/);
                return match ? match[1] : null;
            }).filter(id => id && id.length === 11);

            if (vids.length === 0) return alert('Valid YouTube links daalein!');

            const size = parseInt(document.getElementById('gSize').value);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            for (let i = 0; i < size * size; i++) {
                const box = document.createElement('div');
                box.className = 'vid-box';
                box.innerHTML = '<div class="play-overlay" onclick="playVideo(this.parentNode)">▶️ PLAY</div>';
                box.id = `box-${i}`;
                grid.appendChild(box);
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            isBoosting = true;
            updateStats(0, 0);
            document.getElementById('status').textContent = `${size * size} screens ready!`;
        }

        function playVideo(box) {
            const index = parseInt(box.id.split('-')[1]);
            const vidId = vids[Math.floor(Math.random() * vids.length)];
            const startTime = Math.floor(Math.random() * 60);
            
            const iframe = document.createElement('iframe');
            iframe.src = `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=1&loop=1&playlist=${vidId}&start=${startTime}&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3&disablekb=1&fs=0&controls=0`;
            iframe.allow = "autoplay; encrypted-media; fullscreen; picture-in-picture; web-share";
            iframe.title = "YouTube Video";
            
            box.innerHTML = '';
            box.appendChild(iframe);
            
            // Fake views
            viewCount += Math.floor(Math.random() * 20) + 10;
            updateStats(index + 1, viewCount);
            
            // Auto refresh
            const refreshSec = parseInt(document.getElementById('refreshTime').value) * 1000;
            timeouts[index] = setTimeout(() => {
                if (isBoosting) playVideo(box);
            }, refreshSec + Math.random() * 20000);
        }

        function updateStats(active, views) {
            document.getElementById('activeCount').textContent = active;
            document.getElementById('viewCounter').textContent = views.toLocaleString();
        }

        function stopBoost() {
            isBoosting = false;
            timeouts.forEach(clearTimeout);
            timeouts = [];
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').textContent = 'Stopped';
        }
    </script>
</body>
</html>
