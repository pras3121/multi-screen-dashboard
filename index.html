<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Super YouTube Multi-Screen Booster - FIXED</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; box-sizing: border-box; }
        #header { padding: 20px; background: linear-gradient(#111, #000); border-bottom: 3px solid #f00; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        textarea { width: 100%; max-width: 400px; height: 60px; background: #1a1a1a; color: #0f0; border: 1px solid #333; padding: 10px; border-radius: 5px; }
        select, input { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; }
        input[type=number] { width: 70px; }
        button { background: #f00; color: #fff; border: none; padding: 12px 30px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #666; cursor: not-allowed; }
        #controls { display: flex; gap: 10px; }
        #grid { display: grid; gap: 12px; padding: 20px; }
        .vid-box { position: relative; padding-top: 56.25%; background: #000; box-shadow: 0 0 15px rgba(255,0,0,0.2); border-radius: 8px; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .status-bar { font-size: 14px; margin-left: auto; display: flex; align-items: center; gap: 10px; }
        #viewCounter { background: #00f; padding: 10px 20px; border-radius: 20px; font-size: 18px; font-weight: bold; }
        #progress { width: 200px; height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
        #progressBar { height: 100%; background: linear-gradient(90deg, #f00, #ff0); width: 0%; transition: width 0.3s; }
        .loading { background: #111 url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHZpZXdCb3g9IjAgMCAyMCAyMCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTAiIGN5PSIxMCIgcj0iOCIgc3Ryb2tlPSIjRkZGIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1kYXNoYXJyYXk9IjEyLCA4IiBzdHJva2UtZGFzaG9mZnNldD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIi8+Cjwvc3ZnPg==') center/20px no-repeat; }
    </style>
</head>
<body>

<div id="header">
    <textarea id="vLinks" placeholder="YouTube links paste karein&#10;Example: https://www.youtube.com/watch?v=dQw4w9WgXcQ"></textarea>
    <select id="gSize">
        <option value="3">3x3 (9 screens)</option>
        <option value="4" selected>4x4 (16 screens)</option>
        <option value="5">5x5 (25 screens)</option>
        <option value="6">6x6 (36 screens)</option>
    </select>
    <input type="number" id="minTime" value="60" min="30" max="300" title="Refresh interval (seconds)" />
    <button id="startBtn" onclick="startTraffic()">🚀 Start Booster</button>
    <div id="controls" style="display:none;">
        <button onclick="pauseAll()">⏸️ Pause</button>
        <button onclick="stopAll()">⏹️ Stop</button>
    </div>
    <div class="status-bar">
        <span>Views: <span id="viewCounter">0</span></span>
        <div id="progress"><div id="progressBar"></div></div>
        <span id="stat">Taiyaar... Links dalein!</span>
    </div>
</div>

<div id="grid"></div>

<script>
    let vList = [];
    let timeouts = [];
    let isRunning = false;
    let viewCount = 0;
    let activeVideos = 0;

    function updateCounter() {
        document.getElementById("viewCounter").textContent = viewCount.toLocaleString();
        const progress = Math.min((viewCount % 100) / 100 * 100, 100);
        document.getElementById("progressBar").style.width = progress + '%';
    }

    function startTraffic() {
        const input = document.getElementById("vLinks").value.trim();
        if (!input) return alert("Links dalein pehle!");

        vList = input.split("
").map(l => l.trim()).map(l => {
            const m = l.match(/(?:v=|/(?:shorts/|be/|embed/|v/))([^#&?]{11})/);
            const id = m ? m[1] : (l.length === 11 ? l : null);
            return (id && id.length === 11 && /^[a-zA-Z0-9_-]+$/.test(id)) ? id : null;
        }).filter(Boolean);

        if (vList.length === 0) return alert("Valid YouTube links nahi mile!");

        const size = parseInt(document.getElementById("gSize").value);
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

        // Create all boxes first
        for (let i = 0; i < size * size; i++) {
            const div = document.createElement("div");
            div.className = "vid-box loading";
            div.id = "s-" + i;
            grid.appendChild(div);
        }

        // Show controls
        document.getElementById("controls").style.display = "flex";
        document.getElementById("startBtn").textContent = "🔄 Refreshing...";
        document.getElementById("startBtn").disabled = true;

        isRunning = true;
        viewCount = 0;
        activeVideos = 0;
        updateCounter();
        document.getElementById("stat").textContent = `${size}x${size} screens | ${vList.length} videos`;

        // Launch videos with stagger
        for (let i = 0; i < size * size; i++) {
            setTimeout(() => launchVideo(i), i * 200); // 200ms stagger
        }
    }

    function launchVideo(index) {
        if (!isRunning) return;
        const box = document.getElementById("s-" + index);
        if (!box || !vList.length) return;

        const vidID = vList[Math.floor(Math.random() * vList.length)];
        const start = Math.floor(Math.random() * 90) + 10;
        const rand = Math.random().toString(36).substring(7);
        const quality = ['tiny', 'small', 'medium'][Math.floor(Math.random() * 3)];

        const iframe = document.createElement("iframe");
        iframe.src = `https://www.youtube.com/embed/${vidID}?autoplay=1&mute=1&playlist=${vidID}&loop=1&start=${start}&rel=0&iv_load_policy=3&vq=${quality}&enablejsapi=1&widgetid=${rand}&origin=${window.location.origin}`;
        iframe.allow = "autoplay; encrypted-media; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        iframe.title = `Video ${index}`;

        box.innerHTML = "";
        box.classList.remove("loading");
        box.appendChild(iframe);
        activeVideos++;

        // Add fake views
        setInterval(() => {
            if (Math.random() < 0.1) { // 10% chance
                viewCount += Math.floor(Math.random() * 5) + 1;
                updateCounter();
            }
        }, 5000);

        // Refresh timeout
        const minTime = Math.max(60000, parseInt(document.getElementById("minTime").value) * 1000);
        timeouts[index] = setTimeout(() => launchVideo(index), minTime + (Math.random() * 45000));
    }

    function pauseAll() {
        document.querySelectorAll('iframe').forEach(iframe => {
            iframe.src = iframe.src.replace('autoplay=1', 'autoplay=0');
        });
    }

    function stopAll() {
        isRunning = false;
        timeouts.forEach(clearTimeout);
        document.getElementById("stat").textContent = "Stopped";
        document.getElementById("startBtn").textContent = "🚀 Start Booster";
        document.getElementById("startBtn").disabled = false;
        document.getElementById("controls").style.display = "none";
        activeVideos = 0;
    }
</script>
</body>
</html>
