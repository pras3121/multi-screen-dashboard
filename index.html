<!DOCTYPE html>
<html>
<head>
  <title>Multi Screen Dashboard</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    #controls {
      padding: 10px;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    textarea {
      width: 100%;
      height: 80px;
      margin-top: 5px;
    }

    button, select, input {
      margin: 5px;
      padding: 8px;
    }

    #grid {
      display: grid;
      gap: 5px;
      padding: 5px;
    }

    iframe {
      width: 100%;
      height: 150px;
      border: none;
    }
  </style>
</head>
<body>

<div id="controls">
  Grid:
  <select id="gridSize">
    <option value="4">4×4</option>
    <option value="5">5×5</option>
    <option value="6" selected>6×6</option>
  </select>

  <button onclick="startAll()">▶ Start</button>
  <button onclick="stopAll()">⏹ Stop</button>
  <button onclick="loadVideos()">📥 Load Videos</button>

  <br>
  Auto Change (sec):
  <input type="number" id="intervalTime" value="60" min="5">

  <br>
  <textarea id="videoInput" placeholder="Paste YouTube video IDs or full links (one per line)"></textarea>
</div>

<div id="grid"></div>

<script>
  let videoList = [];
  let currentGrid = 6;
  let playing = true;
  let interval;

  function extractVideoID(url) {
    if (url.includes("youtube.com") || url.includes("youtu.be")) {
      let match = url.match(/(v=|\/)([0-9A-Za-z_-]{11})/);
      return match ? match[2] : null;
    }
    return url; // assume direct ID
  }

  function loadVideos() {
    const input = document.getElementById("videoInput").value;
    videoList = input.split("\n")
      .map(v => extractVideoID(v.trim()))
      .filter(v => v);

    createGrid(currentGrid);
    startAutoChange();
  }

  function createGrid(size) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

    for (let i = 0; i < size * size; i++) {
      const iframe = document.createElement("iframe");
      const vid = getRandomVideo();
      iframe.dataset.video = vid;
      iframe.src = getVideoURL(vid);
      grid.appendChild(iframe);
    }
  }

  function getRandomVideo() {
    if (videoList.length === 0) return "";
    return videoList[Math.floor(Math.random() * videoList.length)];
  }

  function getVideoURL(id) {
    return `https://www.youtube.com/embed/${id}?autoplay=${playing ? 1 : 0}&mute=1`;
  }

  function startAll() {
    playing = true;
    updateAll();
  }

  function stopAll() {
    playing = false;
    updateAll();
  }

  function updateAll() {
    document.querySelectorAll("iframe").forEach(frame => {
      frame.src = getVideoURL(frame.dataset.video);
    });
  }

  function randomizeVideos() {
    document.querySelectorAll("iframe").forEach(frame => {
      const vid = getRandomVideo();
      frame.dataset.video = vid;
      frame.src = getVideoURL(vid);
    });
  }

  function startAutoChange() {
    clearInterval(interval);
    const sec = document.getElementById("intervalTime").value * 1000;

    interval = setInterval(() => {
      randomizeVideos();
    }, sec);
  }

  document.getElementById("gridSize").addEventListener("change", (e) => {
    currentGrid = parseInt(e.target.value);
    createGrid(currentGrid);
  });

  createGrid(currentGrid);
</script>

</body>
</html>
